<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leyte Pickleball Ratings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    <img src="pickleball-green-icon-logo-free-png.png" id="logo" alt="Leyte Pickleball">
    <h1>Leyte Pickleball Skill Assessment</h1>
    <button id="loginBtn">Committee Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>
</header>

<div class="filter-section">
    <input type="text" id="searchBar" onkeyup="filterPlayers()" placeholder="Search Name or Court...">
    
    <select id="locationFilter" onchange="filterPlayers()">
        <option value="All">All Locations</option>
        <option value="Inopacan">Inopacan</option>
        <option value="Hindang">Hindang</option>
        <option value="Hilongos">Hilongos</option>
        <option value="Bato">Bato</option>
        <option value="Matalom">Matalom</option>
    </select>
</div>

<div id="playerList"></div>

<div id="adminPanel" style="display:none;">
    <h2>Official Assessment Form</h2>
    <input type="hidden" id="editId">
    
    <input type="text" id="pName" placeholder="Player Full Name">
    
    <select id="pCourt">
        <option value="" disabled selected>Select Court Location</option>
        
        <optgroup label="Inopacan">
            <option value="VC Sports Complex">VC Sports Complex</option>
            <option value="Jyn's Hotel">Jyn's Hotel</option>
        </optgroup>
        
        <optgroup label="Hindang">
            <option value="DDN">DDN</option>
            <option value="Hindang Gym">Hindang Gym</option>
        </optgroup>
        
        <optgroup label="Hilongos">
            <option value="Galingan">Galingan</option>
            <option value="BMVL">BMVL</option>
            <option value="Himoaw">Himoaw</option>
        </optgroup>
        
        <optgroup label="Bato">
            <option value="Combado">Combado</option>
            <option value="Tito Vics">Tito Vics</option>
            <option value="002">002</option>
            <option value="Tabunok">Tabunok</option>
        </optgroup>

        <optgroup label="Matalom">
            <option value="Matalom">Matalom Town Proper</option>
        </optgroup>
    </select>

    <div class="rating-grid">
        
        <div class="criteria-group">
            <h4>1. Forehand</h4>
            <label><input type="radio" name="forehand" value="1"> 1 - No accuracy/control</label>
            <label><input type="radio" name="forehand" value="2"> 2 - Medium pace, limited direction</label>
            <label><input type="radio" name="forehand" value="3"> 3 - Consistent depth/control</label>
            <label><input type="radio" name="forehand" value="4"> 4 - Uses pace to force errors</label>
            <label><input type="radio" name="forehand" value="5"> 5 - Mastery of spin and placement</label>
        </div>

        <div class="criteria-group">
            <h4>2. Backhand</h4>
            <label><input type="radio" name="backhand" value="1"> 1 - Avoids backhand</label>
            <label><input type="radio" name="backhand" value="2"> 2 - Learning form, weak</label>
            <label><input type="radio" name="backhand" value="3"> 3 - Moderate success, not reliable</label>
            <label><input type="radio" name="backhand" value="4"> 4 - Consistent pace and depth</label>
            <label><input type="radio" name="backhand" value="5"> 5 - Strong offensive setups</label>
        </div>

        <div class="criteria-group">
            <h4>3. Serve & Return</h4>
            <label><input type="radio" name="serve" value="1"> 1 - Lacks depth/accuracy</label>
            <label><input type="radio" name="serve" value="2"> 2 - In play, limited control</label>
            <label><input type="radio" name="serve" value="3"> 3 - Varying depth/speed</label>
            <label><input type="radio" name="serve" value="4"> 4 - Power, spin, and depth</label>
            <label><input type="radio" name="serve" value="5"> 5 - Mastery of variety to set up offense</label>
        </div>

        <div class="criteria-group">
            <h4>4. Dinking</h4>
            <label><input type="radio" name="dink" value="1"> 1 - Basic rally only</label>
            <label><input type="radio" name="dink" value="2"> 2 - Limited height control</label>
            <label><input type="radio" name="dink" value="3"> 3 - Developing patience</label>
            <label><input type="radio" name="dink" value="4"> 4 - Changes pace, offensive intent</label>
            <label><input type="radio" name="dink" value="5"> 5 - Mastered deceptive pace</label>
        </div>

        <div class="criteria-group">
            <h4>5. Third Shot (Drop/Drive)</h4>
            <label><input type="radio" name="drop" value="1"> 1 - Medium pace, no direction</label>
            <label><input type="radio" name="drop" value="2"> 2 - Developing drop to transition</label>
            <label><input type="radio" name="drop" value="3"> 3 - Mixes soft/power inconsistently</label>
            <label><input type="radio" name="drop" value="4"> 4 - Effective strategies consistent</label>
            <label><input type="radio" name="drop" value="5"> 5 - Mastered drop/drive both sides</label>
        </div>

        <div class="criteria-group">
            <h4>6. Volleys</h4>
            <label><input type="radio" name="volley" value="1"> 1 - Lacks control</label>
            <label><input type="radio" name="volley" value="2"> 2 - Developing control</label>
            <label><input type="radio" name="volley" value="3"> 3 - Variety of speeds, learning resets</label>
            <label><input type="radio" name="volley" value="4"> 4 - Blocks hard volleys, swinging volleys</label>
            <label><input type="radio" name="volley" value="5"> 5 - Mastery of resets and placement</label>
        </div>

        <div class="criteria-group">
            <h4>7. Transition / Positioning</h4>
            <label><input type="radio" name="trans" value="1"> 1 - Stays at baseline</label>
            <label><input type="radio" name="trans" value="2"> 2 - Inconsistent forward movement</label>
            <label><input type="radio" name="trans" value="3"> 3 - Moderate anticipation</label>
            <label><input type="radio" name="trans" value="4"> 4 - Comfortable at NVZ (Kitchen)</label>
            <label><input type="radio" name="trans" value="5"> 5 - Mastery of poaching/stacking</label>
        </div>

        <div class="criteria-group">
            <h4>8. Strategy</h4>
            <label><input type="radio" name="strat" value="1"> 1 - Frequent unforced errors</label>
            <label><input type="radio" name="strat" value="2"> 2 - Understands fundamentals</label>
            <label><input type="radio" name="strat" value="3"> 3 - Identifies weaknesses</label>
            <label><input type="radio" name="strat" value="4"> 4 - Adjusts style to opponent</label>
            <label><input type="radio" name="strat" value="5"> 5 - Master strategist, adapts instantly</label>
        </div>

        <div class="criteria-group">
            <h4>9. Rules & Scoring</h4>
            <label><input type="radio" name="rules" value="1"> 1 - Struggles with score</label>
            <label><input type="radio" name="rules" value="2"> 2 - Understands basic rules</label>
            <label><input type="radio" name="rules" value="3"> 3 - Consistently keeps score</label>
            <label><input type="radio" name="rules" value="4"> 4 - Deep understanding</label>
            <label><input type="radio" name="rules" value="5"> 5 - Advanced rules (stacking/timeouts)</label>
        </div>

        <div class="criteria-group">
            <h4>10. Footwork</h4>
            <label><input type="radio" name="foot" value="1"> 1 - Static, poor balance</label>
            <label><input type="radio" name="foot" value="2"> 2 - Inconsistent lateral movement</label>
            <label><input type="radio" name="foot" value="3"> 3 - Good footwork</label>
            <label><input type="radio" name="foot" value="4"> 4 - Quick, balanced, efficient</label>
            <label><input type="radio" name="foot" value="5"> 5 - Elite deceptive movement</label>
        </div>

        <div class="criteria-group">
            <h4>11. Shot Variety</h4>
            <label><input type="radio" name="var" value="1"> 1 - Predictable</label>
            <label><input type="radio" name="var" value="2"> 2 - Beginning to vary</label>
            <label><input type="radio" name="var" value="3"> 3 - Mixes soft/hard shots</label>
            <label><input type="radio" name="var" value="4"> 4 - Disguises intent well</label>
            <label><input type="radio" name="var" value="5"> 5 - Master of deception (ATP/Erne)</label>
        </div>
    </div> <button id="saveBtn" onclick="addPlayer()">Submit Official Rating</button>
</div>

    <input type="text" id="searchBar" placeholder="Search for a player..." onkeyup="filterPlayers()">
    <div id="playerList"></div>

    <!-- Login Modal -->
    <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h3>Committee Login</h3>
            <input type="email" id="loginEmail" placeholder="Committee Email" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;">
            <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;">
            <div style="text-align:right; margin-top:20px;">
                <button onclick="closeLoginModal()" style="background:#ccc; margin-right:10px;">Cancel</button>
                <button onclick="performLogin()" style="background:#85bb2f;">Login</button>
            </div>
        </div>
    </div>

    <script>
        console.log('Script tag loaded');
        function testClick() {
            console.log('Test function called');
            alert('Button is working!');
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
