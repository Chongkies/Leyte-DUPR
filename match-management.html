<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Management - LDUPR</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .match-management-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa, #e8f5e9);
            min-height: 100vh;
        }
        
        .match-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .match-header h1 {
            color: var(--deep-court-green);
            margin: 0 0 20px 0;
            font-size: 2.5rem;
            font-weight: 800;
        }
        
        .match-header p {
            color: var(--text-secondary);
            margin: 0 0 30px 0;
            font-size: 1.1rem;
        }
        
        .match-controls {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .control-item label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .control-item select,
        .control-item input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
        }
        
        .control-item select:focus,
        .control-item input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2);
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-green), #45a049);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }
        
        .matches-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        .match-item {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        .match-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        
        .match-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .match-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--deep-court-green);
        }
        
        .match-meta {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .match-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .tournament-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-major {
            background: #ff6b6b;
            color: white;
        }
        
        .badge-minor {
            background: #4ecdc4;
            color: white;
        }
        
        .badge-money-game {
            background: #ffc107;
            color: #000;
        }
        
        .match-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .detail-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .detail-label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .detail-value {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .players-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .player-tag {
            background: var(--primary-green);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .rating-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: 5px;
        }
        
        .match-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .control-group {
                grid-template-columns: 1fr;
            }
            
            .match-details {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="match-management-container">
        <!-- Header -->
        <div class="match-header">
            <h1>Match Management</h1>
            <p>View, filter, and manage all recorded matches with automatic dynamic rating adjustment</p>
        </div>
        
        <!-- Controls -->
        <div class="match-controls">
            <div class="control-group">
                <div class="control-item">
                    <label for="playerFilter">Filter by Player</label>
                    <select id="playerFilter">
                        <option value="">All Players</option>
                    </select>
                </div>
                
                <div class="control-item">
                    <label for="tournamentFilter">Filter by Tournament</label>
                    <select id="tournamentFilter">
                        <option value="">All Tournaments</option>
                        <option value="major">Major Tournament</option>
                        <option value="minor">Minor Tournament</option>
                        <option value="money-game">Money Game</option>
                    </select>
                </div>
            </div>
            
            <div class="control-group">
                <div class="control-item">
                    <label for="sortBy">Sort By</label>
                    <select id="sortBy">
                        <option value="timestamp">Most Recent</option>
                        <option value="player">Player Name</option>
                        <option value="tournament">Tournament</option>
                    </select>
                </div>
                
                <div class="control-item">
                    <label for="dateFrom">Date From</label>
                    <input type="date" id="dateFrom">
                </div>
                
                <div class="control-item">
                    <label for="dateTo">Date To</label>
                    <input type="date" id="dateTo">
                </div>
            </div>
            
            <div class="action-buttons">
                <button onclick="loadMatches()" class="btn btn-primary">🔄 Load Matches</button>
                <button onclick="clearFilters()" class="btn btn-secondary">🔄 Clear Filters</button>
            </div>
        </div>
        
        <!-- Matches List -->
        <div class="matches-list">
            <div id="matchesList" class="loading">
                Loading matches...
            </div>
        </div>
    </div>

    <script type="module" src="match-management.js"></script>
</body>
</html>
